name: Daily CloakBrowser Canary

on:
  schedule:
    - cron: "23 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  cloakbrowser-canary:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    env:
      PYTHONPATH: ${{ github.workspace }}/src
      PAPER_FETCH_RUN_LIVE: "1"
      CLOAKBROWSER_HEADLESS: "true"
      CROSSREF_MAILTO: ${{ secrets.CROSSREF_MAILTO }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install canary dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m playwright install-deps chromium

      - name: Select daily browser sample
        id: select
        shell: bash
        run: |
          python - <<'PY'
          from datetime import datetime, timezone
          import os
          from pathlib import Path

          from tests.provider_benchmark_samples import provider_benchmark_sample

          providers = (
              "wiley",
              "science",
              "pnas",
              "ams",
              "mdpi",
              "annualreviews",
              "acs",
              "iop",
              "aip",
          )
          today = datetime.now(timezone.utc).date()
          provider = providers[today.toordinal() % len(providers)]
          sample = provider_benchmark_sample(provider)

          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as output:
              output.write(f"provider={provider}\n")
              output.write(f"doi={sample.doi}\n")
              output.write(f"expected_source={sample.expected_source}\n")
              output.write(f"title={sample.title}\n")
              output.write(f"landing_url={sample.landing_url}\n")
          PY

      - name: Validate canary configuration
        id: config
        shell: bash
        env:
          PROVIDER: ${{ steps.select.outputs.provider }}
          DOI: ${{ steps.select.outputs.doi }}
          EXPECTED_SOURCE: ${{ steps.select.outputs.expected_source }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          mkdir -p "$RUNNER_TEMP/canary"
          if [ -z "${CROSSREF_MAILTO:-}" ]; then
            cat > "$RUNNER_TEMP/canary/failure_body.md" <<EOF
          Daily CloakBrowser canary could not run because the required secret is missing.

          - Provider: $PROVIDER
          - DOI: $DOI
          - Expected source: $EXPECTED_SOURCE
          - Missing secret: CROSSREF_MAILTO
          - Workflow run: $RUN_URL

          Add the repository secret and rerun this workflow manually to verify the canary.
          EOF
            echo "ok=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "ok=true" >> "$GITHUB_OUTPUT"

      - name: Run paper-fetch CLI canary
        id: fetch
        if: ${{ steps.config.outputs.ok == 'true' }}
        shell: bash
        env:
          DOI: ${{ steps.select.outputs.doi }}
        run: |
          mkdir -p "$RUNNER_TEMP/canary/downloads"
          set +e
          paper-fetch \
            --query "$DOI" \
            --format json \
            --output "$RUNNER_TEMP/canary/article.json" \
            --output-dir "$RUNNER_TEMP/canary/downloads" \
            --artifact-mode none \
            --asset-profile none \
            --include-refs none \
            > "$RUNNER_TEMP/canary/stdout.log" \
            2> "$RUNNER_TEMP/canary/stderr.log"
          exit_code=$?
          set -e
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"

      - name: Validate canary result
        id: validate
        if: ${{ steps.config.outputs.ok == 'true' }}
        shell: bash
        env:
          ARTICLE_JSON: ${{ runner.temp }}/canary/article.json
          STDOUT_LOG: ${{ runner.temp }}/canary/stdout.log
          STDERR_LOG: ${{ runner.temp }}/canary/stderr.log
          FAILURE_BODY: ${{ runner.temp }}/canary/failure_body.md
          VALIDATION_JSON: ${{ runner.temp }}/canary/validation.json
          FETCH_EXIT_CODE: ${{ steps.fetch.outputs.exit_code }}
          PROVIDER: ${{ steps.select.outputs.provider }}
          DOI: ${{ steps.select.outputs.doi }}
          TITLE: ${{ steps.select.outputs.title }}
          LANDING_URL: ${{ steps.select.outputs.landing_url }}
          EXPECTED_SOURCE: ${{ steps.select.outputs.expected_source }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path


          def tail(path: Path, limit: int = 4000) -> str:
              if not path.exists():
                  return ""
              text = path.read_text(encoding="utf-8", errors="replace")
              return text[-limit:]


          article_path = Path(os.environ["ARTICLE_JSON"])
          stdout_path = Path(os.environ["STDOUT_LOG"])
          stderr_path = Path(os.environ["STDERR_LOG"])
          expected_source = os.environ["EXPECTED_SOURCE"]
          exit_code = int(os.environ.get("FETCH_EXIT_CODE") or "1")

          failures = []
          article = {}
          if exit_code != 0:
              failures.append(f"paper-fetch exited with code {exit_code}")
          elif not article_path.is_file():
              failures.append(f"article JSON was not written: {article_path}")
          else:
              try:
                  article = json.loads(article_path.read_text(encoding="utf-8"))
              except json.JSONDecodeError as exc:
                  failures.append(f"article JSON could not be parsed: {exc}")

          quality = article.get("quality") if isinstance(article, dict) else {}
          if isinstance(article, dict) and article:
              actual_source = article.get("source")
              has_fulltext = bool((quality or {}).get("has_fulltext"))
              content_kind = (quality or {}).get("content_kind")
              if actual_source != expected_source:
                  failures.append(
                      f"source mismatch: expected {expected_source!r}, got {actual_source!r}"
                  )
              if not has_fulltext:
                  failures.append("quality.has_fulltext is not true")
              if content_kind != "fulltext":
                  failures.append(f"quality.content_kind is {content_kind!r}, not 'fulltext'")
          else:
              actual_source = None
              has_fulltext = False
              content_kind = None

          validation = {
              "provider": os.environ["PROVIDER"],
              "doi": os.environ["DOI"],
              "expected_source": expected_source,
              "actual_source": actual_source,
              "has_fulltext": has_fulltext,
              "content_kind": content_kind,
              "exit_code": exit_code,
              "failures": failures,
              "source_trail": (quality or {}).get("source_trail") if isinstance(quality, dict) else None,
          }
          Path(os.environ["VALIDATION_JSON"]).write_text(
              json.dumps(validation, ensure_ascii=False, indent=2),
              encoding="utf-8",
          )

          summary_lines = [
              "## Daily CloakBrowser canary",
              "",
              f"- Provider: {os.environ['PROVIDER']}",
              f"- DOI: {os.environ['DOI']}",
              f"- Expected source: {expected_source}",
              f"- Actual source: {actual_source}",
              f"- Full text: {has_fulltext}",
              f"- Exit code: {exit_code}",
          ]
          if failures:
              summary_lines.append(f"- Failures: {'; '.join(failures)}")
          Path(os.environ["GITHUB_STEP_SUMMARY"]).write_text(
              "\n".join(summary_lines) + "\n",
              encoding="utf-8",
          )

          if failures:
              body = [
                  "Daily CloakBrowser canary failed.",
                  "",
                  f"- Provider: {os.environ['PROVIDER']}",
                  f"- DOI: {os.environ['DOI']}",
                  f"- Title: {os.environ['TITLE']}",
                  f"- Landing URL: {os.environ['LANDING_URL']}",
                  f"- Expected source: {expected_source}",
                  f"- Actual source: {actual_source}",
                  f"- Full text: {has_fulltext}",
                  f"- Content kind: {content_kind}",
                  f"- Exit code: {exit_code}",
                  f"- Workflow run: {os.environ['RUN_URL']}",
                  "",
                  "stdout tail:",
                  "```text",
                  tail(stdout_path) or "<empty>",
                  "```",
                  "",
                  "stderr tail:",
                  "```text",
                  tail(stderr_path) or "<empty>",
                  "```",
              ]
              Path(os.environ["FAILURE_BODY"]).write_text(
                  "\n".join(body) + "\n",
                  encoding="utf-8",
              )
              ok = "false"
          else:
              ok = "true"

          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as output:
              output.write(f"ok={ok}\n")
          PY

      - name: Upload canary diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: cloakbrowser-canary-diagnostics
          path: ${{ runner.temp }}/canary
          if-no-files-found: ignore

      - name: Create failure issue
        if: ${{ always() && (steps.config.outputs.ok != 'true' || steps.validate.outputs.ok != 'true') }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PROVIDER: ${{ steps.select.outputs.provider }}
          DOI: ${{ steps.select.outputs.doi }}
          BODY_FILE: ${{ runner.temp }}/canary/failure_body.md
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ ! -s "$BODY_FILE" ]; then
            mkdir -p "$(dirname "$BODY_FILE")"
            cat > "$BODY_FILE" <<EOF
          Daily CloakBrowser canary failed before result validation could write diagnostics.

          - Provider: ${PROVIDER:-unknown}
          - DOI: ${DOI:-unknown}
          - Workflow run: $RUN_URL

          Inspect the workflow logs and uploaded diagnostics, if any.
          EOF
          fi

          title="Daily CloakBrowser canary failed: ${PROVIDER:-unknown} ${DOI:-unknown} (#${GITHUB_RUN_ID})"
          issue_url="$(gh issue create --title "$title" --body-file "$BODY_FILE")"
          echo "Created canary failure issue: $issue_url"

          gh label create cloakbrowser-canary --color 5319e7 --description "Daily CloakBrowser canary failure" || true
          gh label create ci-failure --color d73a4a --description "CI or scheduled workflow failure" || true
          gh issue edit "$issue_url" --add-label cloakbrowser-canary --add-label ci-failure || true

      - name: Fail canary job
        if: ${{ always() && (steps.config.outputs.ok != 'true' || steps.validate.outputs.ok != 'true') }}
        run: exit 1
