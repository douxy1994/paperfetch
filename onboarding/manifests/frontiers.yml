success_criteria: {}
route_contract:
  landing_html:
    success_requires:
      - legacy or canonical Frontiers article URL resolves to a canonical journal article page
      - landing metadata or canonical URL exposes XML and PDF route candidates
    reject_if_any:
      - challenge page
      - empty shell
    notes: Landing HTML is discovery-only; article content comes from public JATS XML or PDF fallback.
  xml:
    success_requires:
      - canonical Frontiers /xml route returns JATS XML
      - XML response parses as a JATS article
      - title or DOI metadata is present
      - body sections, abstract, or references are present
    reject_if_any:
      - HTML wrapper
      - challenge page
      - empty article shell
      - metadata-only XML without article body or references
    min_body_chars: 1200
    min_body_sections: 1
  pdf_fallback:
    success_requires:
      - canonical or legacy Frontiers /pdf route returns PDF bytes
      - PDF response has application/pdf content type or PDF magic bytes
      - PDF text extraction produces body text
    reject_if_any:
      - HTML wrapper
      - challenge page
      - access gate page
      - error page
    require_pdf_magic: true
    reject_html_wrapper: true
  metadata_only:
    success_requires:
      - metadata contains DOI or title
      - source trail marks metadata-only fallback
    reject_if_any:
      - fabricated body text
      - provider-specific fulltext source without fulltext
markdown_contract:
