    must_not_include:
      - Download PDF
      - Article metrics
    must_match:
      - (?:!\[Figure|\*\*Figure|Figure\s+1)
  supplementary:
    doi: 10.3389/fmars.2023.1101972
    must_include:
      - Supplementary material
    must_not_include:
      - Download PDF
      - Article metrics
  references:
    doi: 10.3389/fmars.2023.1101972
